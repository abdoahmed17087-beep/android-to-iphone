<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق تحويل أندرويد لآيفون</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية جرادينت عصرية */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95); /* خلفية بيضاء شفافة قليلاً */
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px); /* تأثير زجاجي خفيف */
        }

        h1 {
            color: #1d1d1f;
            font-size: 26px;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .download-btn {
            display: inline-block;
            background-color: #0071e3;
            color: white;
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease; /* تنعيم كل الحركات */
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        .download-btn:hover {
            background-color: #0077ed;
            transform: translateY(-3px) scale(1.03); /* حركة للأعلى قليلاً */
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.4);
        }

        .download-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>تطبيق تحويل اندرويد لايفون</h1>
        <a href="https://play.google.com/store/apps/details?id=ios.launcher.launcherios.iphone" class="download-btn">
            التحميل للأندرويد
        </a>
    </div>

</body>
</html>
