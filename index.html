<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق تحويل أندرويد لآيفون</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #1d1d1f;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .download-btn {
            display: inline-block;
            background-color: #0071e3;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .download-btn:hover {
            background-color: #0077ed;
            transform: scale(1.02);
        }

        .download-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>تطبيق تحويل اندرويد لايفون</h1>
        <a href="https://play.google.com/store/apps/details?id=ios.launcher.launcherios.iphone" class="download-btn">
            التحميل للأندرويد
        </a>
    </div>

</body>
</html>
